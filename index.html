<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        /* 2000년대 초반 시스템 폰트 감성 */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Dotum', '돋움', sans-serif;
            overflow: hidden;
        }

        /* 4:3 비율의 CRT 브라운관 프레임 */
        .crt-monitor {
            position: relative;
            width: 95vw;
            height: calc(95vw * 0.75);
            max-height: 95vh;
            max-width: calc(95vh * 1.33);
            background: #050508;
            /* 렌즈 왜곡: 모서리를 크게 둥글게 */
            border-radius: 80px; 
            box-shadow: inset 0 0 100px #000, 0 0 0 30px #1a1a1a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 화면 굴곡 및 비네팅 효과 */
        .screen-fx {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%),
                radial-gradient(circle, transparent 50%, rgba(0,0,0,0.7) 100%);
            background-size: 100% 4px, cover;
            z-index: 10; pointer-events: none;
        }

        /* 로딩 UI */
        .loading-wrap {
            width: 70%; text-align: center; z-index: 5;
        }

        .title {
            color: #fff; font-size: 3rem; font-weight: 900;
            letter-spacing: 15px; margin-bottom: 50px;
            text-shadow: 4px 4px 0px #222;
            font-style: italic;
        }

        .bar-bg {
            width: 100%; height: 40px;
            border: 5px solid #444; background: #000;
            padding: 5px; box-sizing: border-box;
        }

        .bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(to right, #0033aa, #0099ff, #0033aa);
            box-shadow: 0 0 20px rgba(0, 153, 255, 0.8);
            animation: load 6s infinite steps(10); /* 뚝뚝 끊기는 로딩 감성 */
        }

        .status {
            color: #0099ff; font-size: 1.5rem; margin-top: 20px;
            font-weight: bold;
        }

        .tip {
            margin-top: 60px; color: #777; font-size: 1.1rem;
            border-top: 1px solid #333; padding-top: 20px;
        }

        @keyframes load {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        /* 화면 미세 떨림 */
        @keyframes flicker {
            0% { opacity: 0.97; }
            100% { opacity: 1; }
        }
        .crt-monitor { animation: flicker 0.05s infinite; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="screen-fx"></div>
    
    <div class="loading-wrap">
        <div class="title">SINCE 2001</div>
        
        <div class="bar-bg">
            <div class="bar-fill"></div>
        </div>
        
        <div class="status">데이터 수신 중...</div>
        
        <div class="tip">
            [도움말] 2001년에 태어난 당신은 <br>
            <b>거상</b>과 <b>크아</b>가 동갑내기 친구입니다.
        </div>
    </div>
</div>

</body>
</html>
