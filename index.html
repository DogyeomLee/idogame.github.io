<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 하십시오!</title>
    <style>
        /* 1. CRT 및 전체 배경 설정 */
        body {
            background-color: #008080; /* 옛날 윈도우 시그니처 청록색 */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* CRT 화면 굴곡 및 노이즈 효과 */
        .crt-screen {
            position: relative;
            width: 95vw;
            height: 90vh;
            background: #c0c0c0;
            border: 15px solid #333; /* 모니터 베젤 */
            border-radius: 50px;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5), 0 0 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        /* 스캔라인 효과 */
        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* 미세한 화면 떨림 */
        .flicker {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 16, 16, 0.03);
            opacity: 0;
            z-index: 11;
            pointer-events: none;
            animation: flicker 0.12s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.1; }
            50% { opacity: 0.02; }
            100% { opacity: 0.08; }
        }

        /* 2. 윈도우 창 스타일 */
        .window {
            width: 80%;
            max-width: 700px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #848484;
            border-bottom-color: #848484;
            box-shadow: 1px 1px #000;
            margin: auto;
            z-index: 2;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 3px 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        .title-buttons button {
            width: 18px;
            height: 16px;
            font-size: 10px;
            font-weight: bold;
            background: #c0c0c0;
            border: 1px solid #fff;
            border-right-color: #848484;
            border-bottom-color: #848484;
            padding: 0;
            cursor: pointer;
        }

        .title-buttons button:active {
            border: 1px solid #848484;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        /* 3. 버튼 스타일 (Win98 감성) */
        .btn-retro {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #848484;
            border-bottom-color: #848484;
            padding: 5px 15px;
            font-family: inherit;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-retro:active {
            border: 2px solid #848484;
            border-right-color: #fff;
            border-bottom-color: #fff;
            padding: 6px 14px 4px 16px; /* 클릭 시 살짝 들어가는 효과 */
        }

        .window-body {
            padding: 20px;
            color: #000;
        }

        .status-bar {
            border-top: 1px solid #848484;
            padding: 2px 5px;
            font-size: 12px;
            display: flex;
            gap: 10px;
        }

        .inset-panel {
            border: 1px solid #848484;
            border-right-color: #fff;
            border-bottom-color: #fff;
            padding: 10px;
            background: #fff;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="crt-screen">
    <div class="flicker"></div>
    
    <div class="window">
        <div class="title-bar">
            <span>My_Portfolio_v1.0.exe</span>
            <div class="title-buttons">
                <button>_</button>
                <button>□</button>
                <button onclick="alert('System: Cannot close portfolio!')">X</button>
            </div>
        </div>
        
        <div class="window-body">
            <p>Welcome, guest. Please select a category:</p>
            
            <div class="inset-panel">
                <h2 style="font-size: 18px; margin-top: 0;">[ User Profile ]</h2>
                <p>Status: Seeking Opportunities</p>
                <p>Skills: HTML, CSS, JavaScript, Retro-Design</p>
            </div>

            <!-- 하단 버튼들 -->
            <div class="controls">
                <button class="btn-retro" onclick="location.href='https://github.com'">GitHub</button>
                <button class="btn-retro" onclick="alert('Coming Soon!')">Projects</button>
                <button class="btn-retro" onclick="confirm('Email을 보내시겠습니까?')">Contact</button>
            </div>
        </div>

        <div class="status-bar">
            <span>Object(s): 3</span>
            <span>|</span>
            <span>Capacity: 1.44MB</span>
        </div>
    </div>
</div>

</body>
</html>
