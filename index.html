<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dev Portfolio - Retro CRT</title>
    <style>
        /* 기본 배경 설정 */
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* 1. TV 외부 프레임 (베이지색 본체) */
        .tv-frame {
            position: relative;
            width: 800px;
            height: 600px;
            background: #dcd0c0;
            border-radius: 80px 80px 100px 100px;
            box-shadow: 
                inset -10px -10px 20px rgba(0,0,0,0.2),
                inset 10px 10px 20px rgba(255,255,255,0.5),
                30px 30px 60px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 2. 오렌지색 전면 배젤 */
        .tv-bezel {
            position: relative;
            width: 92%;
            height: 88%;
            background: #e63900;
            border-radius: 60px 60px 90px 90px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            padding-left: 60px; /* 스피커 공간 */
        }

        /* 3. CRT 화면 (렌즈 왜곡 효과의 핵심) */
        .screen-container {
            position: relative;
            width: 85%;
            height: 85%;
            background: #000;
            border-radius: 50% / 10%; /* 상하 좌우 볼록한 효과 */
            overflow: hidden;
            border: 15px solid #1a1a1a;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* 4. 화면 내부 콘텐츠 및 굴곡 효과 */
        .screen-content {
            width: 100%;
            height: 100%;
            background: #0d1a0d;
            color: #00ff41;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            /* 화면이 튀어나와 보이는 렌즈 효과 */
            background: radial-gradient(circle, #1a331a 0%, #050a05 100%);
            animation: flicker 0.15s infinite;
        }

        /* 5. CRT 스캔라인 및 노이즈Overlay */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.15) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.05), 
                rgba(0, 255, 0, 0.02), 
                rgba(0, 0, 255, 0.05)
            );
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 텍스트 스타일링 */
        h1 { font-size: 2.5rem; text-shadow: 0 0 10px #00ff41; }
        .cursor { display: inline-block; width: 12px; height: 24px; background: #00ff41; animation: blink 0.8s infinite; }

        /* 하단 장식 요소 */
        .lg-logo {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .speaker {
            position: absolute;
            left: 15px;
            width: 35px;
            height: 150px;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 5px 5px;
            opacity: 0.5;
        }

        /* 애니메이션 */
        @keyframes flicker {
            0% { opacity: 0.99; }
            100% { opacity: 1; }
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 반응형 스케일 조절 */
        .tv-scaler {
            transform: scale(1);
        }
    </style>
</head>
<body>

<div class="tv-scaler">
    <div class="tv-frame">
        <!-- 하단 다리 (간소화) -->
        <div style="position:absolute; bottom:-20px; left:100px; width:60px; height:40px; background:#aaa; clip-path:polygon(20% 0, 80% 0, 100% 100%, 0 100%);"></div>
        <div style="position:absolute; bottom:-20px; right:100px; width:60px; height:40px; background:#aaa; clip-path:polygon(20% 0, 80% 0, 100% 100%, 0 100%);"></div>

        <div class="tv-bezel">
            <div class="speaker"></div>
            
            <div class="screen-container">
                <div class="crt-overlay"></div>
                <div class="screen-content">
                    <h1>> GAME_DEVELOPER_PORTFOLIO</h1>
                    <p>NAME: HONG GIL DONG</p>
                    <p>STATUS: READY TO CODE...</p>
                    <br>
                    <p>[PROJECTS]</p>
                    <p>- NEON STRIKE (2025)</p>
                    <p>- RETRO QUEST (2024)</p>
                    <br>
                    <p>> LOADING CORE SKILLS... <span class="cursor"></span></p>
                </div>
            </div>

            <div class="lg-logo">RETRO LG</div>
            <!-- 전원 버튼 -->
            <div style="position:absolute; bottom: -50px; left: 50%; transform:translateX(-50%); width:40px; height:40px; background:#ff4500; border-radius:50%; border:4px solid #dcd0c0; box-shadow: 0 4px #8b2500;"></div>
        </div>
    </div>
</div>

</body>
</html>
