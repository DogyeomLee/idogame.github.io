<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Classic K-Game Portfolio</title>
    <style>
        /* 한글 궁서체 및 레트로 폰트 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Gungsuh&family=Press+Start+2P&display=swap');

        :root {
            --bg-dark: #0a0a0a;
            --main-gold: #b39151; /* 절제된 고전 금색 */
            --sub-white: #d1d1d1;
            --crt-glow: rgba(179, 145, 81, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Gungsuh', '궁서', serif;
        }

        /* 1. 화면 레이아웃 (4:3 비율 최대화) */
        .monitor-frame {
            position: relative;
            width: 98vw;
            height: calc(98vw * 0.75);
            max-height: 98vh;
            max-width: calc(98vh * 1.33);
            background: var(--bg-dark);
            border: 2px solid #222;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 2. CRT 물리적 왜곡 및 필터 */
        .crt-filter {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                /* 미세한 주사선 */
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                /* 외곽 비네팅 (볼록한 느낌) */
                radial-gradient(circle, transparent 60%, rgba(0,0,0,0.7) 120%);
            background-size: 100% 3px, cover;
            z-index: 10;
            pointer-events: none;
        }

        /* 3. 메인 화면 구성 */
        .screen {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            border: 1px solid #1a1a1a;
            position: relative;
        }

        /* 헤더: 고전 게임 서체 스타일 */
        .header {
            display: flex;
            justify-content: space-between;
            color: var(--main-gold);
            font-size: 1.2rem;
            border-bottom: 1px solid var(--main-gold);
            padding-bottom: 10px;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        /* 타이틀: 묵직한 궁서체 */
        .title-container {
            text-align: center;
            margin-bottom: 60px;
        }

        .main-title {
            font-size: 5rem;
            color: var(--sub-white);
            text-shadow: 0 0 20px rgba(179, 145, 81, 0.3);
            margin: 0;
            font-weight: normal;
        }

        .sub-title {
            color: var(--main-gold);
            font-size: 1.5rem;
            margin-top: 10px;
            letter-spacing: 10px;
        }

        /* 메뉴: 절제된 단색 디자인 */
        .menu-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .menu-item {
            color: var(--sub-white);
            font-size: 2rem;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            padding: 5px 40px;
        }

        /* 메뉴 선택 시 고전적인 꺽쇠 표시 */
        .menu-item:hover {
            color: var(--main-gold);
        }

        .menu-item:hover::before {
            content: "◈";
            position: absolute;
            left: 0;
            color: var(--main-gold);
        }
        .menu-item:hover::after {
            content: "◈";
            position: absolute;
            right: 0;
            color: var(--main-gold);
        }

        /* 하단 푸터 */
        .footer {
            margin-top: auto;
            text-align: center;
            color: #444;
            font-size: 1rem;
            letter-spacing: 5px;
        }

        /* 화면 깜빡임 효과 */
        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.95; }
            10% { opacity: 0.9; }
            15% { opacity: 0.95; }
            20% { opacity: 0.98; }
            100% { opacity: 1; }
        }
        .screen { animation: flicker 0.1s infinite; }

    </style>
</head>
<body>

<div class="monitor-frame">
    <div class="crt-filter"></div>
    
    <div class="screen">
        <div class="header">
            <span>西紀 二千二十六年</span> <!-- 서기 2026년 한자 병기 -->
            <span>開發者 洪吉童</span>    <!-- 개발자 홍길동 한자 병기 -->
        </div>

        <div class="title-container">
            <h1 class="main-title">홍길동 포트폴리오</h1>
            <div class="sub-title">無 限 創 造</div>
        </div>

        <div class="menu-list">
            <div class="menu-item">기술 연대기 (技術 年代記)</div>
            <div class="menu-item">진행 프로젝트 (進行 課題)</div>
            <div class="menu-item">서신 보내기 (書信 傳達)</div>
        </div>

        <div class="footer">
            ⓒ 2026 GILDONG WORKS ALL RIGHTS RESERVED.
        </div>
    </div>
</div>

</body>
</html>
