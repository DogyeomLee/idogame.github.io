<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CRT Round Frame Effect</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* 어두운 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 1. TV 외부 본체 */
        .tv-bezel {
            width: 90vw;
            height: 90vh;
            background: #111;
            border-radius: 40px; /* 외부 모서리는 살짝 둥글게 */
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 50px rgba(255,255,255,0.05);
        }

        /* 2. [핵심] 둥근 항아리 모양의 화면 영역 */
        .tv-screen {
            width: 100%;
            height: 100%;
            background-color: #000;
            position: relative;
            overflow: hidden;

            /* 
               이미지 자체를 왜곡하지 않고, '보이는 영역'만 
               상하좌우가 볼록한 항아리 모양으로 깎아냅니다.
            */
            border-radius: 50% / 10%; /* 가로/세로 곡률을 다르게 주어 항아리 형태 구현 */
            
            /* 좀 더 정교한 곡선을 위해 mask-image 사용 (선택 사항) */
            /* 여기에 아래 속성을 추가하면 모서리가 더 부드럽게 깎입니다. */
            mask-image: radial-gradient(circle, black 70%, transparent 100%);
        }

        /* 3. 실제 이미지 배치 */
        .content-image {
            width: 100%;
            height: 100%;
            
            /* 이미지 경로를 image_01e5fb.jpg로 설정 */
            background-image: url('image_01e5fb.jpg'); 
            background-size: cover;
            background-position: center;
            
            /* 이미지 가장자리를 어둡게 해서 브라운관 느낌 추가 */
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* 4. 화면 위를 덮는 유리 질감 */
        .glass-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at center, 
                rgba(255,255,255,0.1) 0%, 
                transparent 70%
            );
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="tv-bezel">
        <div class="tv-screen">
            <!-- 굴곡진 영역 안에 선명하게 들어가는 이미지 -->
            <div class="content-image"></div>
            <!-- 유리 반사 효과 -->
            <div class="glass-overlay"></div>
        </div>
    </div>

</body>
</html>
