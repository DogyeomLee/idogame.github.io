<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro Wildlife TV</title>
    <style>
        body {
            background-color: #050505;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. TV 외관 (실제 사진 소스를 배경으로 활용하는 구조) */
        .tv-wrapper {
            position: relative;
            width: 1000px; /* 큰 화면 */
            height: 750px;
            /* 실제 TV의 질감을 가진 이미지를 배경으로 사용 */
            background: url('https://images.rawpixel.com/image_png_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy9tZXNzH3YvcG5nL2VsZW1lbnRzL3Jhd3BpeGVsLWl0ZW0taWRlYS00NTU4NjkucG5n') no-repeat center;
            background-size: contain;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. 화면 영역 (TV 프레임 안쪽 구멍에 딱 맞춤) */
        .screen-area {
            position: absolute;
            width: 615px;  /* 이미지의 화면 구멍 크기에 맞게 조절 필요 */
            height: 460px;
            top: 108px;    /* 이미지 위치에 맞게 세밀하게 조정 */
            left: 145px;
            background: #000;
            border-radius: 40px / 20px; /* 화면의 미세한 곡률 */
            overflow: hidden;
            z-index: -1; /* TV 프레임 아래로 배치 */
        }

        /* 3. 진짜 다큐멘터리 같은 영상 소스 및 효과 */
        .video-overlay {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1549366021-9f761d450615?q=80&w=1000') no-repeat center;
            background-size: cover;
            filter: contrast(1.1) saturate(1.2) sepia(0.2); /* 옛날 영상 색감 */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 40px;
            box-sizing: border-box;
        }

        /* 4. [핵심] 브라운관 질감 필터 (지지직거리는 노이즈) */
        .crt-noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_filmgrain.gif'); /* 필름 노이즈 */
            opacity: 0.15;
            pointer-events: none;
            z-index: 5;
        }

        /* 5. 90년대 자막 (삼국지+다큐멘터리 폰트) */
        .subtitles {
            color: #fff;
            font-family: 'Gulim', 'Dotum', sans-serif;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
            /* 90년대 방송국 특유의 진한 검정 외곽선 */
            text-shadow: 
                2px 2px 0 #000, -2px -2px 0 #000, 
                2px -2px 0 #000, -2px 2px 0 #000,
                0 0 8px rgba(0,0,0,1);
            z-index: 10;
        }

        /* 방송국 로고 */
        .logo {
            position: absolute;
            top: 30px;
            right: 40px;
            color: rgba(255,255,255,0.4);
            font-family: serif;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="tv-wrapper">
    <!-- 화면 구멍 안쪽 -->
    <div class="screen-area">
        <div class="crt-noise"></div>
        <div class="video-overlay">
            <div class="logo">KBS1</div>
            <div class="subtitles">
                그는 조용히 에디터를 엽니다...<br>
                밤샘 코딩의 시작인 것입니다.
            </div>
        </div>
    </div>
</div>

</body>
</html>
