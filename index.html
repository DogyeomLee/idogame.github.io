<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CRT Effect</title>

<style>
body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CRT 외형 */
.crt {
    position: relative;
    width: 800px;
    height: 600px;
    background: black;
    border-radius: 30px;
    overflow: hidden;

    /* 렌즈 느낌 */
    transform: perspective(800px) scale(1.02);
}

/* 내부 화면 */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    padding: 20px;
    color: #0f0;
    font-family: monospace;
    font-size: 20px;

    /* 색수차 */
    text-shadow:
        -1px 0 red,
        1px 0 blue;

    animation: flicker 0.15s infinite;
}

/* 스캔라인 */
.crt::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;

    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.05) 0px,
        rgba(0,0,0,0.2) 2px,
        rgba(0,0,0,0.2) 4px
    );

    pointer-events: none;
}

/* 비네팅 + 곡률 강조 */
.crt::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;

    background: radial-gradient(
        circle at center,
        transparent 60%,
        rgba(0,0,0,0.6) 100%
    );

    pointer-events: none;
}

/* 깜빡임 */
@keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.9; }
    100% { opacity: 1; }
}

/* 살짝 흔들림 */
@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-1px, 1px); }
    40% { transform: translate(1px, -1px); }
    60% { transform: translate(-1px, 0); }
    80% { transform: translate(1px, 0); }
    100% { transform: translate(0); }
}

.screen {
    animation: flicker 0.15s infinite, glitch 0.3s infinite;
}
</style>

</head>

<body>

<div class="crt">
    <div class="screen">
        > SYSTEM BOOTING...<br>
        > LOADING MODULES...<br>
        > WELCOME USER_<br><br>
        C:\>
    </div>
</div>

</body>
</html>
