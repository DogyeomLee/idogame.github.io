<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro Portfolio - Stable Version</title>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { 
            background-color: #000; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
        }
        #screen-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 10px solid #333;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 100px rgba(0,0,0,0.5);
            background: #000;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; cursor: pointer; }
        /* CRT 주사선 효과를 위한 오버레이 레이어 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; /* 클릭 통과 */
        }
    </style>
</head>
<body>
    <div id="screen-container">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay"></div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 캔버스 크기 고정 (고전 게임 해상도)
canvas.width = 800;
canvas.height = 600;

let page = 0;
const data = [
    {
        title: "CHARACTER INFO",
        items: ["NAME: HONG GIL DONG", "JOB: FULL-STACK DEV", "LOC: SEOUL, KOREA"],
        stats: [["LOGIC", 95], ["DESIGN", 80], ["SPEED", 88]]
    },
    {
        title: "SKILL INVENTORY",
        items: ["TECH: REACT, NEXT.JS", "ENGINE: WEBGL, CANVAS", "TOOL: DOCKER, GIT"],
        stats: [["POWER", 90], ["MP", 100], ["LUCK", 75]]
    }
];

function draw() {
    const current = data[page];
    
    // 1. 배경 (삼국지 특유의 딥 네이비)
    ctx.fillStyle = "#000525";
    ctx.fillRect(0, 0, 800, 600);

    // 2. 고전적인 금색 이중 테두리
    ctx.strokeStyle = "#860";
    ctx.lineWidth = 10;
    ctx.strokeRect(15, 15, 770, 570);
    ctx.strokeStyle = "#fb0";
    ctx.lineWidth = 2;
    ctx.strokeRect(25, 25, 750, 550);

    // 3. 상단 타이틀 바
    ctx.fillStyle = "#860";
    ctx.fillRect(25, 25, 750, 50);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 28px 'Courier New'";
    ctx.textAlign = "center";
    ctx.fillText(current.title, 400, 60);

    // 4. 정보 텍스트 (선명도 최우선)
    ctx.textAlign = "left";
    ctx.font = "bold 24px monospace";
    current.items.forEach((text, i) => {
        ctx.fillStyle = "#fff";
        ctx.fillText(text, 80, 150 + (i * 50));
    });

    // 5. 능력치 바
    current.stats.forEach((s, i) => {
        let y = 350 + (i * 60);
        ctx.fillStyle = "#aaa";
        ctx.fillText(s[0], 80, y);
        
        ctx.fillStyle = "#111";
        ctx.fillRect(250, y - 20, 400, 25);
        ctx.fillStyle = "#0ff";
        ctx.fillRect(250, y - 20, s[1] * 4, 25);
        
        ctx.fillStyle = "#fff";
        ctx.fillText(s[1], 670, y);
    });

    // 6. 클릭 가이드 (깜빡임)
    if (Math.floor(Date.now() / 600) % 2 === 0) {
        ctx.fillStyle = "#ff0";
        ctx.textAlign = "center";
        ctx.font = "20px monospace";
        ctx.fillText(">> PRESS START (CLICK ANYWHERE) <<", 400, 560);
    }

    requestAnimationFrame(draw);
}

// 클릭 이벤트
canvas.addEventListener('click', () => {
    page = (page + 1) % data.length;
});

// 시작
draw();
</script>
</body>
</html>
