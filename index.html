<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2000s K-Game Style Portfolio</title>
    <style>
        /* 2000년대 초반 게임 특유의 굵고 가독성 좋은 폰트 느낌 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@800&family=Black+Han+Sans&display=swap');

        :root {
            --ui-blue: #1e3a5f;      /* 초기 온라인 게임 특유의 네이비 */
            --ui-light-blue: #00d2ff; /* 선택 시 나오는 광원 효과 */
            --ui-border: #4a4a4a;    /* 금속 느낌의 회색 테두리 */
            --bg-black: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Nanum Gothic', sans-serif;
        }

        /* 1. 화면 레이아웃 (4:3 비율 전체화면) */
        .monitor-frame {
            position: relative;
            width: 98vw;
            height: calc(98vw * 0.75);
            max-height: 98vh;
            max-width: calc(98vh * 1.33);
            background: var(--bg-black);
            border: 4px solid #1a1a1a;
            box-shadow: inset 0 0 100px #000, 0 0 50px rgba(0,0,0,1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 2. CRT 및 광원 효과 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 80%);
            background-size: 100% 3px, cover;
            z-index: 10;
            pointer-events: none;
        }

        /* 3. 메인 콘텐츠 영역 */
        .screen {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        /* 상단 바: 당시 게임들의 방 입장 UI 느낌 */
        .top-bar {
            background: linear-gradient(to bottom, #2c3e50, #000);
            border: 2px solid var(--ui-border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            color: #ccc;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* 메인 타이틀: 2000년대 로고 감성 */
        .title-area {
            text-align: center;
            margin-bottom: 50px;
        }

        .main-logo {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 5rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
            /* 푸른색 그라데이션 및 강한 그림자 */
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px #003366);
        }

        /* 메뉴 리스트: 당시 대기방(Lobby) 버튼 스타일 */
        .menu-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .btn-menu {
            width: 400px;
            padding: 20px;
            background: linear-gradient(to bottom, #1e3a5f 0%, #0a1a2f 100%);
            border: 2px solid #3a5a8f;
            color: #fff;
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            transition: all 0.1s;
            position: relative;
        }

        .btn-menu:hover {
            background: linear-gradient(to bottom, #00d2ff 0%, #0072ff 100%);
            border-color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 210, 255, 0.4);
        }

        .btn-menu::before {
            content: "▶";
            position: absolute;
            left: 20px;
            opacity: 0;
        }

        .btn-menu:hover::before {
            opacity: 1;
        }

        /* 하단 상태바: XP 스타일 하단 바 */
        .bottom-info {
            margin-top: auto;
            border-top: 1px solid #333;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 0.8rem;
        }

        /* 애니메이션: 화면 지지직거림 */
        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }
        .monitor-frame::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255,255,255,0.02) 0%, transparent 10%);
            background-size: 100% 20px;
            animation: scan 10s linear infinite;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="monitor-frame">
    <div class="crt-overlay"></div>
    
    <div class="screen">
        <div class="top-bar">
            <span>서버: 한국_개발자_채널</span>
            <span>현재 인원: 1/100</span>
            <span>PING: 15ms</span>
        </div>

        <div class="title-area">
            <h1 class="main-logo">홍길동 포트폴리오</h1>
            <p style="color: var(--ui-light-blue); letter-spacing: 5px;">VER 2.06 - ONLINE</p>
        </div>

        <div class="menu-container">
            <div class="btn-menu">기술 데이터 (TECH)</div>
            <div class="btn-menu">퀘스트 기록 (PROJECT)</div>
            <div class="btn-menu">메시지 전송 (CONTACT)</div>
        </div>

        <div class="bottom-info">
            <span>ID: GILDONG_DEV</span>
            <span>SYSTEM: CRT_MODE_ACTIVE</span>
            <span>© 2000-2006 K-WORKS.</span>
        </div>
    </div>
</div>

</body>
</html>
