<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Realistic Retro LG TV Portfolio</title>
    <style>
        :root {
            --tv-beige: #e2d7c7;
            --tv-orange: #d13000;
            --screen-glow: rgba(100, 200, 255, 0.15);
        }

        body {
            background: radial-gradient(circle at center, #333 0%, #000 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* TV 본체 - 거대한 부피감과 그림자 */
        .tv-unit {
            position: relative;
            width: 1000px;
            height: 780px;
            background: var(--tv-beige);
            /* 실제 플라스틱 질감을 위한 다중 그림자 */
            border-radius: 120px 120px 150px 150px;
            box-shadow: 
                inset 15px 15px 40px rgba(255,255,255,0.7),
                inset -15px -15px 40px rgba(0,0,0,0.2),
                50px 50px 100px rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 전면 오렌지 배젤 - 입체적인 틀 구조 */
        .orange-bezel {
            position: relative;
            width: 900px;
            height: 650px;
            background: var(--tv-orange);
            border-radius: 80px 80px 110px 110px;
            box-shadow: 
                inset 0 10px 20px rgba(255,255,255,0.4),
                inset 0 -10px 20px rgba(0,0,0,0.5),
                0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 50px;
        }

        /* 굴곡진 유리 화면 컨테이너 (어안 렌즈 효과) */
        .crt-glass {
            position: relative;
            width: 700px;
            height: 520px;
            background: #050505;
            border-radius: 50% / 15%; /* 볼록한 브라운관 형태 */
            border: 12px solid #1a1a1a;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* 내부 스크린 콘텐츠 */
        .screen-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            color: #eee;
            font-family: 'Malgun Gothic', sans-serif;
            position: relative;
        }

        /* 실사 같은 유리 반사광 (Glossy Effect) */
        .glass-reflection {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                120deg, 
                rgba(255,255,255,0.15) 0%, 
                rgba(255,255,255,0.05) 20%, 
                transparent 50%
            );
            pointer-events: none;
            z-index: 5;
        }

        /* CRT 주사선 및 노이즈 */
        .crt-effects {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                radial-gradient(var(--screen-glow), transparent);
            background-size: 100% 4px, cover;
            z-index: 4;
            pointer-events: none;
            opacity: 0.6;
        }

        /* 은색 금속 다리 - 정교한 그래디언트 */
        .chrome-leg {
            position: absolute;
            bottom: -40px;
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #ffffff, #888, #444);
            clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
            z-index: -1;
        }
        .leg-left { left: 150px; transform: rotate(-5deg); }
        .leg-right { right: 150px; transform: rotate(5deg); }

        /* 로고 및 디테일 */
        .brand-logo {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            letter-spacing: 3px;
            font-weight: 800;
        }

        /* 포트폴리오 내용 스타일 */
        .project-card {
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--tv-orange);
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>

<div class="tv-unit">
    <div class="chrome-leg leg-left"></div>
    <div class="chrome-leg leg-right"></div>

    <div class="orange-bezel">
        <!-- 스피커 그릴 -->
        <div style="position:absolute; left:40px; width:60px; height:200px; background-image:radial-gradient(#222 1.5px, transparent 1.5px); background-size:8px 8px; opacity:0.6;"></div>
        
        <!-- CRT 브라운관 -->
        <div class="crt-glass">
            <div class="glass-reflection"></div>
            <div class="crt-effects"></div>
            
            <div class="screen-inner">
                <h2 style="color: var(--tv-orange); border-bottom: 2px solid #444; padding-bottom: 10px;">PORTFOLIO_v1.0</h2>
                
                <div class="project-card">
                    <h3 style="margin:0 0 10px 0;">[01] UNREAL ENGINE GAME</h3>
                    <p style="margin:0; font-size: 14px; color: #aaa;">고퀄리티 3D 액션 RPG 개발 중...</p>
                </div>

                <div class="project-card">
                    <h3 style="margin:0 0 10px 0;">[02] RETRO SHADER FX</h3>
                    <p style="margin:0; font-size: 14px; color: #aaa;">CSS와 GLSL을 이용한 화면 효과 구현</p>
                </div>
                
                <div style="margin-top: auto; font-size: 12px; color: #44ff44; opacity: 0.7;">
                    ● SYSTEM: ONLINE <br>
                    ● MEMORY: OPTIMIZED
                </div>
            </div>
        </div>

        <div class="brand-logo">LG Retro</div>
    </div>

    <!-- 전원 다이얼 -->
    <div style="position:absolute; bottom:25px; width:70px; height:70px; background:radial-gradient(#eee, #999); border-radius:50%; border:5px solid var(--tv-beige); box-shadow: 0 5px 15px rgba(0,0,0,0.4); display:flex; justify-content:center; align-items:center;">
        <div style="width:4px; height:30px; background:#d13000; transform:rotate(45deg);"></div>
    </div>
</div>

</body>
</html>
