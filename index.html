<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Realistic CRT Amber Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background-color: #121212; /* 배경을 검정 대신 깊은 그레이로 */
            background-image: radial-gradient(#222 0.5px, transparent 0.5px);
            background-size: 24px 24px; /* 배경에 미세한 패턴 추가 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 4:3 비율의 곡면 컨테이너 */
        .crt-container {
            position: relative;
            width: 80vw;
            max-width: 900px;
            aspect-ratio: 4 / 3;
            /* 렌즈 왜곡 효과: 화면을 앞으로 밀어내고 살짝 구부림 */
            transform: perspective(1000px) rotateX(2deg) scale(1.05);
            filter: contrast(1.2) brightness(1.1);
        }

        /* 실제 렌즈처럼 보이기 위한 구형 왜곡 마스크 */
        .screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: #1a1400; /* 호박색 베이스의 어두운 배경 */
            border-radius: 50% / 8%; /* 상하좌우 곡률 */
            box-shadow: 
                0 0 50px rgba(0,0,0,1),
                inset 0 0 100px rgba(0,0,0,0.8),
                inset 0 0 20px rgba(255, 176, 0, 0.1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 10px solid #222;
        }

        /* 레트로 호박색 텍스트 */
        .terminal-text {
            font-family: 'VT323', monospace; /* 레트로 픽셀 느낌 폰트 */
            color: #ffb000; /* 정통 Amber 색상 */
            font-size: 6vw;
            text-align: center;
            line-height: 1.2;
            text-transform: uppercase;
            /* 글자 번짐(Glow) 효과 */
            text-shadow: 
                0 0 2px rgba(255, 176, 0, 1),
                0 0 15px rgba(255, 176, 0, 0.6),
                0 0 30px rgba(255, 176, 0, 0.3);
            z-index: 5;
            animation: textShadow 1.5s infinite;
        }

        /* 텍스트 미세 떨림 */
        @keyframes textShadow {
            0% { text-shadow: 0 0 4px #ffb000; }
            50% { text-shadow: 0 0 20px #ffb000, 2px 2px 2px rgba(255,0,0,0.2); }
            100% { text-shadow: 0 0 4px #ffb000; }
        }

        /* 스캔라인 및 노이즈 오버레이 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.2) 50%
            ), 
            linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 볼록한 유리 광택 */
        .glass-glare {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(
                circle at 20% 20%, 
                rgba(255, 255, 255, 0.08) 0%, 
                transparent 40%
            );
            pointer-events: none;
            z-index: 12;
            border-radius: 50% / 8%;
        }

        /* 화면 깜빡임 애니메이션 */
        .flicker {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 176, 0, 0.02);
            opacity: 0;
            z-index: 15;
            pointer-events: none;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.1; }
            100% { opacity: 0.02; }
        }
    </style>
</head>
<body>

    <div class="crt-container">
        <div class="screen">
            <div class="terminal-text">
                SYSTEM READY<br>
                INSERT COIN_
            </div>
            
            <!-- CRT 강화 효과 레이어들 -->
            <div class="crt-overlay"></div>
            <div class="glass-glare"></div>
            <div class="flicker"></div>
        </div>
    </div>

</body>
</html>
