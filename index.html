<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro PC 1999</title>
    <style>
        /* [1] 그 시절 감성 폰트와 배경 설정 */
        body {
            background-color: #c0c0c0; /* 윈도우 98의 칙칙한 회색 */
            color: #000; /* 검정색 글자 */
            font-family: 'Courier New', Courier, monospace; /* 타자기 폰트 */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* [2] 뚱뚱한 모니터의 둥근 왜곡 효과 (핵심) */
        .crt-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .crt-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            /* 구부러진 베젤 효과 */
            background: radial-gradient(
                circle at center,
                rgba(255, 255, 255, 0.1) 0%,
                rgba(0, 0, 0, 0.3) 80%,
                rgba(0, 0, 0, 0.6) 100%
            );
            z-index: 5;
            pointer-events: none;
            /* 미세하게 구부리는 마법의 속성 */
            transform: scale(1.02); 
        }

        /* [3] 미세하게 움직이는 스캔라인 효과 */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(0, 0, 0, 0) 50%, 
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 4px; /* 선 굵기 */
            z-index: 6;
            pointer-events: none;
            opacity: 0.8;
        }

        /* [4] 화면 미세 떨림 효과 */
        .flicker {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 16, 16, 0.05);
            opacity: 0;
            z-index: 7;
            pointer-events: none;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.1; }
            5% { opacity: 0.2; }
            10% { opacity: 0.1; }
            50% { opacity: 0.0; }
            80% { opacity: 0.1; }
            100% { opacity: 0.0; }
        }

        /* 콘텐츠 스타일 */
        .content {
            background-color: #fff; /* 콘텐츠 영역은 흰색 */
            border: 2px solid #fff;
            border-right-color: #848484; /* 옛날 3D 테두리 효과 */
            border-bottom-color: #848484;
            padding: 20px;
            width: 80%;
            max-width: 600px;
            z-index: 2;
            position: relative;
        }

        h1 { font-size: 20px; border-bottom: 2px solid #000; padding-bottom: 5px; }
        p { font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <!-- 효과 레이어들 -->
    <div class="crt-container"></div>
    <div class="scanlines"></div>
    <div class="flicker"></div>
    
    <!-- 실제 내용 -->
    <div class="content">
        <h1>Welcome to My Home Page</h1>
        <p>You have reached my official corner on the World Wide Web.</p>
        <p>Best viewed with Netscape Navigator 4.0 at 800x600 resolution.</p>
        <hr>
        <p>Last update: 1999-10-25</p>
    </div>
</body>
</html>
