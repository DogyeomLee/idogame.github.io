<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 XP 포트폴리오</title>
    <style>
        /* 1. XP 배경 (그 유명한 초원 배경) */
        body {
            background: #0080ff url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Windows_XP_Bliss.jpg/1280px-Windows_XP_Bliss.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Tahoma', '굴림', sans-serif;
            overflow: hidden;
        }

        /* CRT 모니터 효과 유지 */
        .crt-screen {
            position: relative;
            width: 98vw;
            height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .crt-screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* 2. XP 스타일 윈도우 창 */
        .window {
            width: 600px;
            background: #ece9d8;
            border: 3px solid #0055e5;
            border-top-left-radius: 8px;
            border-top-right-color: #0055e5;
            border-top-right-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 강렬한 파란색 XP 제목 바 */
        .title-bar {
            background: linear-gradient(to bottom, #0058e6 0%, #3b8cf8 10%, #0053ee 100%);
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px #003399;
        }

        /* XP 특유의 빨간색 닫기 버튼 */
        .close-btn {
            width: 21px;
            height: 21px;
            background: linear-gradient(to bottom, #e76c4a 0%, #c43a1d 100%);
            border: 1px solid #fff;
            border-radius: 3px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: inset 1px 1px rgba(255,255,255,0.3);
        }
        .close-btn:hover { filter: brightness(1.2); }

        /* 3. 내부 콘텐츠 스타일 */
        .window-body {
            padding: 15px;
            color: #000;
        }

        .xp-panel {
            background: #fff;
            border: 1px solid #7f9db9;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 200px;
        }

        /* XP 스타일 녹색/파란색 버튼 */
        .btn-xp {
            background: linear-gradient(to bottom, #ffffff 0%, #ebebe4 100%);
            border: 1px solid #003c74;
            border-radius: 3px;
            padding: 5px 20px;
            cursor: pointer;
            font-family: inherit;
            margin-right: 5px;
            box-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }
        .btn-xp:hover {
            background: linear-gradient(to bottom, #fafafa 0%, #f1f1f1 100%);
            border-color: #ff9900; /* 호버 시 주황색 테두리는 XP 국룰 */
        }

        h2 { font-size: 18px; color: #003399; margin-top: 0; }
    </style>
</head>
<body>

<div class="crt-screen">
    <div class="window">
        <div class="title-bar">
            <span>내 포트폴리오 - Windows Internet Explorer</span>
            <div class="close-btn" onclick="alert('시스템 오류: 닫을 수 없습니다.')">×</div>
        </div>
        
        <div class="window-body">
            <div class="xp-panel">
                <h2>반갑습니다!</h2>
                <p>Windows XP 스타일로 꾸며진 저의 포트폴리오입니다.</p>
                <p><b>사용자:</b> Guest_User_01</p>
                <p><b>현재 위치:</b> 대한민국 창녕군</p>
                <hr>
                <p>원하시는 메뉴를 클릭해 주세요.</p>
            </div>

            <div class="controls">
                <button class="btn-xp" onclick="location.href='https://github.com'">내 깃허브</button>
                <button class="btn-xp" onclick="alert('프로젝트를 불러오는 중...')">내 작업물</button>
                <button class="btn-xp" onclick="confirm('메일을 보낼까요?')">연락하기</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
